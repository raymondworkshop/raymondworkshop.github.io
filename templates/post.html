{% extends "base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<article class="post">
    <header class="post-header">
        <h1>{{ post.title }}</h1>
        {% if post.date %}
        <p class="post-meta">{{ post.date }}</p>
        {% endif %}
    </header>
    <div class="post-body">{{ content }}</div>
</article>

{% endblock content %}
