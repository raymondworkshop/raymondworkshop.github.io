{% extends "base.html" %}

{% block title %}Search{% endblock %}

{% block content %}
<p class="search-back"><a href="/about.html">← About</a></p>

<section class="search-page" aria-label="Search">
  <h1>Search</h1>
  <p class="search-lead">Find posts across all sections.</p>

  <div class="search-field">
    <label class="search-label" for="search-input">Search by title, topic, or content</label>
    <input
      class="search-input"
      id="search-input"
      type="search"
      placeholder="e.g. stoicism, coaching, notes"
      autocomplete="off"
      autofocus
    >
  </div>

  <p class="search-status" id="search-status" aria-live="polite"></p>

  <ul class="search-results" id="search-results"></ul>
</section>

<script src="https://cdn.jsdelivr.net/npm/lunr@2.3.9/lunr.min.js"></script>
<script src="/static/search.js"></script>
{% endblock content %}
