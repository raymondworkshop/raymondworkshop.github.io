<p>旅遊

        在享受快乐时停下来休息片刻
        有意做一些其实不太舒服的事情</p>
<p><b><u>少做一点</u></b>
     -  数量上 <br />
     -  种类上   -  尽可能丰富的<b><u>活动组合在一起</u></b>
     -  时间上   -   即使最愉快的体验，  也要<b><u>在中间休息片刻</u></b></p>
<p>“<b><u>满足式决策者</u></b>”
    - 避免选择过载
    -  只要发现一组选项中第一个可以接受的选项，就会接受它</p></div>
