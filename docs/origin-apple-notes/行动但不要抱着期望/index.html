    <div class="post-body"><p>女生遇上心儀對象該怎麼辦？我贊成行動，但不要抱著期望，因為一有期望就會用力拚，太用力往往適得其反。找個藉口邀約他喝杯咖啡，要是此後他就沒再找你，或更常見的是說會找你卻沒有，那就太明顯了吧，他對你根本不感興趣啊，那就別再浪費時間在此人身上了。Keep住靚，抬起頭做人，待遇見下一個合適的人，再行動。</p></div>
